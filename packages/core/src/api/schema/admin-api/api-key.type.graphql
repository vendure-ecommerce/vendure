"""
Admin API key bound to an Administrator.
@since 3.5.0
"""
enum ApiKeyStatus {
    ACTIVE
    REVOKED
}

type ApiKey implements Node {
    id: ID!
    createdAt: DateTime!
    updatedAt: DateTime!
    name: String!
    prefix: String!
    status: ApiKeyStatus!
    expiresAt: DateTime
    revokedAt: DateTime
    lastUsedAt: DateTime
    version: Int!
    administrator: Administrator!
    notes: String
}

"""
Returned when creating or rotating an API key.
Includes the raw secret once.
@since 3.5.0
"""
type ApiKeyWithSecret {
    apiKey: ApiKey!
    rawKey: String!
}

"""
List options for ApiKeys.
Supports pagination, sorting and filtering.
@since 3.5.0
"""
# generated by generateListOptions function
input ApiKeyListOptions

"""
Filter parameters for querying ApiKeys.
Fields support the standard Vendure operators (equals, contains, in, etc.).
@since 3.5.0
"""
input ApiKeyFilterParameter {
    "Filter by key name"
    name: StringOperators
    "Filter by prefix (e.g. vk_live_ / vk_test_)"
    prefix: StringOperators
    "Filter by status ('ACTIVE' or 'REVOKED')"
    status: StringOperators
    "Filter by expiry timestamp"
    expiresAt: DateOperators
    "Filter by revocation timestamp"
    revokedAt: DateOperators
    "Filter by last-used timestamp"
    lastUsedAt: DateOperators
    "Filter by creation timestamp"
    createdAt: DateOperators
    "Filter by update timestamp"
    updatedAt: DateOperators
    "Filter by bound Administrator id"
    administratorId: IDOperators
}

"""
Sort parameters for ApiKeys.
@since 3.5.0
"""
input ApiKeySortParameter {
    name: SortOrder
    prefix: SortOrder
    status: SortOrder
    expiresAt: SortOrder
    revokedAt: SortOrder
    lastUsedAt: SortOrder
    createdAt: SortOrder
    updatedAt: SortOrder
    version: SortOrder
}

"""
Paginated list wrapper for ApiKeys.
@since 3.5.0
"""
type ApiKeyList implements PaginatedList {
    items: [ApiKey!]!
    totalItems: Int!
}
